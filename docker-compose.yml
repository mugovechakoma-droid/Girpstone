version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: girpstone_db
    restart: always
    environment:
      POSTGRES_USER: girpstone
      POSTGRES_PASSWORD: girpstone_secure_2026
      POSTGRES_DB: girpstone_security
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
